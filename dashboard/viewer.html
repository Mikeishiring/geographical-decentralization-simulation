<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Simulation Viewer</title>

  <script src="https://cdn.plot.ly/plotly-3.1.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="assets/research-catalog.js"></script>

  <style>
    :root {
      --bg1: #f6efe4;
      --bg2: #eadbc6;
      --bg3: #fbf7f1;
      --fg: #1a1f1c;
      --muted: #4f5a55;
      --brand: #d38b45;
      --brand-2: #caa06c;
      --paper: rgba(255,255,255,0.78);
      --paper-strong: rgba(26,31,28,0.08);
      --shadow: 0 16px 36px rgba(20,24,22,0.16);
      --grid-gap: 14px;
    }
    html.dark {
      --bg1: #0f1f1b;
      --bg2: #112926;
      --bg3: #0a1715;
      --fg: #f3f3ef;
      --muted: #c6cbbf;
      --brand: #f4b267;
      --brand-2: #5fd0c3;
      --paper: rgba(255,255,255,0.08);
      --paper-strong: rgba(255,255,255,0.16);
      --shadow: 0 18px 40px rgba(0,0,0,0.35);
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Plus Jakarta Sans", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--fg);
      background:
        radial-gradient(900px 600px at 15% 15%, rgba(203,162,112,0.18) 0%, transparent 60%),
        radial-gradient(1000px 700px at 85% 10%, rgba(211,139,69,0.16) 0%, transparent 60%),
        radial-gradient(1100px 900px at 50% 100%, rgba(155,120,86,0.14) 0%, transparent 60%),
        linear-gradient(160deg, var(--bg1), var(--bg2) 45%, var(--bg3) 100%);
      transition: color .3s ease, background .3s ease;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }
    body::before {
      background:
        linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.22) 45%, transparent 70%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.18) 0 1px, transparent 1px 7px);
      mix-blend-mode: screen;
    }
    html.dark body::before {
      background:
        linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.05) 45%, transparent 70%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 5px);
    }
    body::after {
      background:
        radial-gradient(450px 300px at 8% 85%, rgba(211,139,69,0.24) 0%, transparent 60%),
        radial-gradient(520px 340px at 92% 70%, rgba(203,162,112,0.22) 0%, transparent 60%);
      filter: blur(1px);
    }
    html.dark body::after {
      background:
        radial-gradient(450px 300px at 8% 85%, rgba(244,178,103,0.25) 0%, transparent 60%),
        radial-gradient(520px 340px at 92% 70%, rgba(95,208,195,0.2) 0%, transparent 60%);
    }
    .wrap {
      min-height: 100%;
      padding: 18px;
      max-width: 1500px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    input[type="range"] {
      flex: 1;
      min-width: 180px;
    }
    .card {
      background: var(--paper);
      border: 1px solid var(--paper-strong);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: inherit;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: var(--grid-gap);
      margin-top: 12px;
    }
    .card.plot { height: 360px; padding: 8px 8px 4px 8px; }
    .card.plot.wide { grid-column: 1 / -1; }
    #globe { height: 620px; }
    button {
      border: 0;
      border-radius: 14px;
      padding: 10px 16px;
      font-weight: 700;
      letter-spacing: .3px;
      cursor: pointer;
      color: #121916;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 10px 22px rgba(10,20,16,0.2);
      transition: transform .08s ease, filter .2s ease, box-shadow .2s ease;
    }
    button:hover { filter: brightness(1.05); }
    button:active { transform: translateY(1px); }
    html:not(.dark) button {
      color: #1a1f1c;
      background: linear-gradient(135deg, #e4bc8a, #cf9b63);
      box-shadow: 0 10px 18px rgba(140,98,58,0.22);
    }
    html:not(.dark) button:hover {
      filter: brightness(1.03);
      box-shadow: 0 12px 22px rgba(140,98,58,0.26);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .brand .logo {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      object-fit: contain;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: .3px;
      font-family: "Fraunces", "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    }
    .lead {
      margin: 6px 0 14px 0;
      color: var(--muted);
      line-height: 1.6;
    }
    label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: var(--fg);
    }
    select {
      border-radius: 12px;
      border: 1px solid rgba(26,31,28,0.18);
      padding: 8px 10px;
      background: rgba(255,255,255,0.65);
      color: inherit;
    }
    html.dark select {
      border-color: rgba(255,255,255,0.22);
      background: rgba(8,14,13,0.45);
    }
    select:focus {
      outline: none;
      border-color: var(--brand-2);
      box-shadow: 0 0 0 3px rgba(95,208,195,0.2);
    }
    input[type="range"] {
      appearance: none;
      height: 6px;
      border-radius: 999px;
      background: rgba(26,31,28,0.15);
      accent-color: var(--brand-2);
    }
    html.dark input[type="range"] {
      background: rgba(255,255,255,0.2);
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--brand-2);
      border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--brand-2);
      border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    @media (max-width: 900px) {
      .toolbar { gap: 10px; }
      .toolbar .brand { width: 100%; }
      #globe { height: 460px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="toolbar card">
    <div class="brand">
      <img class="logo" src="assets/logo.jpg" alt="Logo">
      <h1>Simulation Viewer</h1>
    </div>
    <div style="flex:1"></div>
    <button id="play">⏵ Play</button>
    <button id="pause">⏸ Pause</button>
    <label>Step
      <select id="step">
        <option value="1">1</option>
        <option value="10">10</option>
        <option value="50">50</option>
      </select>
    </label>
    <input id="slider" type="range" min="0" max="0" step="1" value="0"/>
    <button id="export" style="margin-right: 4px;">⬇ Export</button>
    <button id="theme">🌓 Theme</button>
  </div>
  <div id="desc" class="card lead" style="display:none"></div>
  <div id="info" class="card lead"></div>
  <div id="globe" class="card"></div>
  <div class="grid">
    <div id="Gini" class="card plot"></div>
    <div id="HHI" class="card plot"></div>
    <div id="liveness" class="card plot"></div>
    <div id="CV" class="card plot"></div>
    <div id="clusters" class="card plot"></div>
    <div id="totaldist" class="card plot"></div>
    <div id="avgnnd" class="card plot"></div>
    <div id="nni" class="card plot"></div>
    <div id="mev" class="card plot"></div>
    <div id="attest" class="card plot"></div>
    <div id="failed" class="card plot"></div>
    <div id="proposal" class="card plot"></div>
    <div id="relaydist" class="card plot wide"></div>
  </div>
</div>

<script>
const RESEARCH_CATALOG = window.RESEARCH_CATALOG || { datasets: [], defaultSelection: null };

function readSettings() {
  const qs = new URLSearchParams(location.search);
  let ls = null;
  try { ls = JSON.parse(localStorage.getItem('app_settings') || 'null'); } catch (_) {}

  const base = {
    dataset: RESEARCH_CATALOG.defaultSelection?.path || 'simulations/test/SSP/data/data.json',
    theme: 'auto',
    step: 1,
    autoplay: false
  };
  const fromQS = {
    dataset: qs.get('dataset') || undefined,
    theme: qs.get('theme') || undefined,
    step: qs.get('step') ? Number(qs.get('step')) : undefined,
    autoplay: qs.get('autoplay') ? (qs.get('autoplay') === 'true') : undefined
  };
  return Object.assign(base, ls || {}, fromQS);
}

const SETTINGS = readSettings();
let dark = (SETTINGS.theme === 'dark')
        || (SETTINGS.theme === 'auto' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);

function findParam(key, data) {
  const containers = [data, data && data.meta, data && data.config, data && data.params, data && data.parameters];
  for (const obj of containers) {
    if (!obj || typeof obj !== 'object') continue;
    if (key in obj) return obj[key];
    const lowerKey = String(key).toLowerCase();
    for (const currentKey of Object.keys(obj)) {
      if (String(currentKey).toLowerCase() === lowerKey) return obj[currentKey];
    }
  }
  return null;
}

function formatParam(value) {
  if (value == null || Number.isNaN(value)) return '—';
  if (typeof value === 'number') return Number.isInteger(value) ? String(value) : String(value);
  return String(value);
}

function updateSummaryPanel(data) {
  const descEl = document.getElementById('desc');
  if (!descEl) return;

  const validatorCount = findParam('|V|', data) ?? findParam('V', data) ?? findParam('v', data) ?? findParam('validators', data) ?? findParam('num_validators', data);
  const nValue = findParam('N', data) ?? findParam('n', data) ?? findParam('num_nodes', data) ?? findParam('n_slots', data);
  const delta = findParam('delta', data);
  const cutoff = findParam('cutoff', data);
  const cost = findParam('cost', data);
  const gamma = findParam('gamma', data);
  const summary = (data && (data.description || (data.meta && data.meta.description))) || '';

  const values = [validatorCount, nValue, delta, cutoff, cost, gamma];
  const hasConfig = values.some(value => value != null);
  const hasSummary = Boolean(summary);
  if (!hasConfig && !hasSummary) {
    descEl.style.display = 'none';
    descEl.innerHTML = '';
    return;
  }

  const configHTML = hasConfig ? `
    <div style="display:flex;flex-wrap:wrap;gap:10px">
      <span><b>Configuration</b></span>
      <span><b>|V|:</b> ${formatParam(validatorCount)}</span>
      <span><b>N:</b> ${formatParam(nValue)}</span>
      <span><b>cost:</b> ${formatParam(cost)}</span>
      <span><b>Δ:</b> ${formatParam(delta)} ms</span>
      <span><b>cutoff:</b> ${formatParam(cutoff)} ms</span>
      <span><b>γ:</b> ${formatParam(gamma)}</span>
    </div>` : '';
  const summaryHTML = hasSummary ? `<div style="margin-top:8px"><b>Summary:</b> ${summary}</div>` : '';
  descEl.innerHTML = `${configHTML}${summaryHTML}`;
  descEl.style.display = 'block';
}

let DATA = null;
let playing = !!SETTINGS.autoplay;
let slot = 0;
let stepSize = SETTINGS.step || 1;

let nSlots = 1;
let FULL_X = [0];

let RELAY_LAT = [];
let RELAY_LON = [];
let RELAY_NAMES = [];

let plotsReady = false;
let globeReady = false;

let RAW_GCP_CSV = null;
let RAW_DATA_JSON = null;

function plotlyTheme(isDark, title = '', yTitle = '') {
  if (isDark) {
    return {
      title,
      paper_bgcolor: '#101b18',
      plot_bgcolor: '#101b18',
      font: { color: '#f3f3ef', size: 12 },
      colorway: ['#f4b267', '#5fd0c3', '#f7d08a', '#9ad4c7', '#e6a59c'],
      xaxis: { title: { text: 'Slot' }, gridcolor: '#2f3d38', tickfont: { size: 11 } },
      yaxis: { title: { text: yTitle }, gridcolor: '#2f3d38', tickfont: { size: 11 } }
    };
  }
  return {
    title,
    paper_bgcolor: 'rgba(244,239,229,0.75)',
    plot_bgcolor: 'rgba(244,239,229,0.75)',
    font: { color: '#1a1f1c', size: 12 },
    colorway: ['#d89046', '#2ea69a', '#c97c5d', '#6a9c7e', '#9a7e6b'],
    xaxis: { title: { text: 'Slot' }, gridcolor: '#d6d3c8', tickfont: { size: 11 } },
    yaxis: { title: { text: yTitle }, gridcolor: '#d6d3c8', tickfont: { size: 11 } }
  };
}

function extractCountry(location) {
  if (!location) return 'Unknown';
  const parts = String(location).split(',');
  const last = parts[parts.length - 1];
  return (last || 'Unknown').trim() || 'Unknown';
}

const COUNTRY_ISO3 = {
  USA: 'USA',
  Japan: 'JPN',
  India: 'IND',
  Australia: 'AUS',
  Germany: 'DEU',
  Italy: 'ITA',
  Canada: 'CAN',
  'South Africa': 'ZAF',
  Taiwan: 'TWN',
  China: 'CHN',
  'South Korea': 'KOR',
  Singapore: 'SGP',
  Indonesia: 'IDN',
  Poland: 'POL',
  Finland: 'FIN',
  Sweden: 'SWE',
  Spain: 'ESP',
  Belgium: 'BEL',
  UK: 'GBR',
  Netherlands: 'NLD',
  Switzerland: 'CHE',
  France: 'FRA',
  Qatar: 'QAT',
  Israel: 'ISR',
  Brazil: 'BRA',
  Chile: 'CHL'
};

async function loadGCPData() {
  const csvUrl = './data/gcp_regions.csv';
  const resp = await fetch(csvUrl, { cache: 'no-cache' });
  if (!resp.ok) throw new Error(`Failed to load ${csvUrl}`);
  RAW_GCP_CSV = await resp.text();

  return new Promise((resolve, reject) => {
    Papa.parse(RAW_GCP_CSV, {
      header: true,
      skipEmptyLines: true,
      complete(results) {
        const dataMap = new Map();
        results.data.forEach(row => {
          const key = row.Region;
          if (key) dataMap.set(key, row);
        });
        resolve(dataMap);
      },
      error(err) {
        reject(err);
      }
    });
  });
}

async function loadData() {
  const resp = await fetch(SETTINGS.dataset, { cache: 'no-cache' });
  if (!resp.ok) throw new Error(`Failed to load ${SETTINGS.dataset}`);
  RAW_DATA_JSON = await resp.text();
  DATA = JSON.parse(RAW_DATA_JSON);

  updateSummaryPanel(DATA);
  DATA.gcpData = await loadGCPData();

  const gcpLatLon = new Map();
  for (const [key, value] of DATA.gcpData.entries()) {
    const lat = Number(value['Nearest City Latitude']);
    const lon = Number(value['Nearest City Longitude']);
    if (Number.isFinite(lat) && Number.isFinite(lon)) {
      gcpLatLon.set(String(key), [lat, lon]);
    }
  }
  DATA.gcpLatLon = gcpLatLon;

  nSlots = Math.max(
    1,
    DATA.n_slots || 0,
    DATA.metrics?.clusters?.length || 0,
    DATA.slots?.length || 0
  );
  FULL_X = Array.from({ length: nSlots }, (_, i) => i);
  document.getElementById('slider').max = String(Math.max(0, nSlots - 1));

  RELAY_NAMES = (DATA.sources || []).map(source => source[0]);
  RELAY_LAT = [];
  RELAY_LON = [];
  for (const source of (DATA.sources || [])) {
    const region = String(source[1]);
    const latLon = DATA.gcpLatLon.get(region);
    if (latLon) {
      RELAY_LAT.push(latLon[0]);
      RELAY_LON.push(latLon[1]);
    } else {
      RELAY_LAT.push(0);
      RELAY_LON.push(0);
    }
  }
}

function drawGlobe(index) {
  const countryCounts = new Map();
  for (const [region, count] of (DATA.slots[index] || [])) {
    const row = DATA.gcpData && DATA.gcpData.get(String(region));
    const country = extractCountry(row && row.location);
    const validators = Number(count) || 0;
    if (COUNTRY_ISO3[country]) {
      countryCounts.set(country, (countryCounts.get(country) || 0) + validators);
    }
  }

  let maxCountryCount = 1;
  for (const count of countryCounts.values()) {
    if (count > maxCountryCount) maxCountryCount = count;
  }

  const locations = [];
  const values = [];
  const hoverText = [];
  for (const [country, count] of countryCounts.entries()) {
    const iso3 = COUNTRY_ISO3[country];
    if (!iso3) continue;
    locations.push(iso3);
    values.push(count);
    hoverText.push(`${country} • ${count} validators`);
  }

  if (!globeReady) {
    const countries = {
      type: 'choropleth',
      locations,
      z: values,
      text: hoverText,
      locationmode: 'ISO-3',
      colorscale: dark
        ? [[0, '#17302b'], [0.35, '#2f7d74'], [0.7, '#86cbb9'], [1, '#f2b35d']]
        : [[0, '#f2ece2'], [0.3, '#d9b488'], [0.65, '#b97744'], [1, '#8f5326']],
      zmin: 0,
      zmax: maxCountryCount,
      showscale: true,
      colorbar: {
        title: { text: 'Number of validators', side: 'right' },
        x: 1.12,
        len: 0.7,
        titlefont: { color: dark ? '#f0f0f0' : '#0b1220' },
        tickfont: { color: dark ? '#f0f0f0' : '#0b1220' }
      },
      marker: { line: { color: dark ? '#2f3d38' : '#c8c2b8', width: 0.5 } },
      hovertemplate: '%{text}<extra>Country</extra>',
      name: 'Validators'
    };

    const relays = {
      type: 'scattergeo',
      mode: 'markers',
      lat: RELAY_LAT,
      lon: RELAY_LON,
      marker: { size: 10, color: 'red', symbol: 'diamond', line: { color: 'black', width: 1 } },
      text: RELAY_NAMES,
      hovertemplate: '%{text}<extra>Info Source</extra>',
      name: 'Info Sources'
    };

    const layout = {
      ...plotlyTheme(dark, 'Geo Tracker', ''),
      margin: { l: 15, r: 40, b: 20, t: 40 },
      geo: {
        projection: { type: 'natural earth' },
        showland: true,
        landcolor: dark ? '#15201d' : '#e7e1d6',
        showocean: true,
        oceancolor: dark ? '#0f1714' : '#f3f1ea',
        showcountries: true,
        countrycolor: dark ? '#2e3a36' : '#c8c2b8',
        showcoastlines: true,
        coastlinecolor: dark ? '#2e3a36' : '#c8c2b8',
        bgcolor: 'rgba(0,0,0,0)'
      },
      showlegend: true,
      legend: { x: 0.02, y: 0.98, bgcolor: dark ? 'rgba(45,45,45,0.7)' : 'rgba(255,255,255,0.7)' }
    };

    Plotly.newPlot('globe', [countries, relays], layout, { displaylogo: false, responsive: true, displayModeBar: false });
    globeReady = true;
    return;
  }

  Plotly.restyle('globe', {
    locations: [locations],
    z: [values],
    zmax: [maxCountryCount],
    text: [hoverText]
  }, [0]);
}

function drawLine(divId, x, y, title, yTitle = '') {
  const el = document.getElementById(divId);
  const height = (el.clientHeight || 360) * 0.94;
  const layout = {
    ...plotlyTheme(dark, title, yTitle),
    height,
    margin: { l: 60, r: 20, t: 40, b: 40 },
    hovermode: 'x unified',
    xaxis: {
      ...(plotlyTheme(dark, title, yTitle).xaxis),
      autorange: false,
      range: [0, 0]
    }
  };
  Plotly.newPlot(divId, [{
    type: 'scatter',
    mode: 'lines',
    x,
    y,
    line: { width: 2 }
  }], layout, { displaylogo: false, responsive: true, displayModeBar: false });
}

function drawRelayDist() {
  const el = document.getElementById('relaydist');
  const height = (el.clientHeight || 360) * 0.94;
  const series = DATA.metrics.info_avg_distance || [];
  const names = RELAY_NAMES || [];

  const traces = [];
  const count = Math.max(names.length, ...(series || []).map(row => (row || []).length), 0);
  for (let sourceIndex = 0; sourceIndex < count; sourceIndex++) {
    const y = new Array(nSlots).fill(null);
    for (let t = 0; t < nSlots; t++) {
      const row = series[t];
      y[t] = (row && row[sourceIndex] != null) ? row[sourceIndex] : null;
    }
    traces.push({
      type: 'scatter',
      mode: 'lines',
      x: FULL_X,
      y,
      name: names[sourceIndex] || `Source ${sourceIndex}`,
      line: { width: 2 },
      hovertemplate: '%{y}<extra>%{fullData.name}</extra>'
    });
  }

  const layout = {
    ...plotlyTheme(dark, 'Avg Distance to Info Sources', 'Avg. Distance to Info Sources'),
    height,
    margin: { l: 60, r: 20, t: 40, b: 40 },
    hovermode: 'x unified',
    xaxis: {
      ...(plotlyTheme(dark, '', '').xaxis),
      autorange: false,
      range: [0, 0]
    }
  };
  Plotly.newPlot('relaydist', traces, layout, { displaylogo: false, responsive: true, displayModeBar: false });
  Plotly.relayout('relaydist', { showlegend: false });
}

function infoHTML(index) {
  const metrics = DATA.metrics;
  const number = value => Number.isFinite(value) ? value : 0;
  return `
    <div style="display:flex;flex-wrap:wrap;gap:18px">
      <span><b>Slot</b> ${index + 1}</span>
      <span>Clusters: ${metrics.clusters[index]}</span>
      <span>Total Distance: ${number(metrics.total_distance[index]).toFixed(4)}</span>
      <span>Avg NND: ${number(metrics.avg_nnd[index]).toFixed(4)}</span>
      <span>NNI: ${number(metrics.nni[index]).toFixed(4)}</span>
      <span>MEV: ${number(metrics.mev[index]).toFixed(4)}</span>
      <span>Attest: ${number(metrics.attestations[index]).toFixed(2)}%</span>
      <span>Proposal Time: ${number(metrics.proposal_times[index]).toFixed(2)} ms</span>
    </div>`;
}

function updateLineWindows(index) {
  const range = index <= 0 ? [-1, -0.1] : [0, index];
  const plotRange = { 'xaxis.range': range };
  Plotly.relayout('Gini', plotRange);
  Plotly.relayout('HHI', plotRange);
  Plotly.relayout('liveness', plotRange);
  Plotly.relayout('CV', plotRange);
  Plotly.relayout('clusters', plotRange);
  Plotly.relayout('totaldist', plotRange);
  Plotly.relayout('avgnnd', plotRange);
  Plotly.relayout('nni', plotRange);
  Plotly.relayout('mev', plotRange);
  Plotly.relayout('attest', plotRange);
  Plotly.relayout('failed', plotRange);
  Plotly.relayout('proposal', plotRange);
  Plotly.relayout('relaydist', plotRange);
}

function drawAll() {
  document.getElementById('info').innerHTML = infoHTML(slot);
  document.getElementById('slider').value = String(slot);

  if (!plotsReady) {
    drawGlobe(slot);

    const metrics = DATA.metrics;
    drawLine('Gini', FULL_X, (metrics.gini || []).slice(0, nSlots), 'Gini Coefficient', 'Gini');
    drawLine('HHI', FULL_X, (metrics.hhi || []).slice(0, nSlots), 'HHI', 'HHI');
    drawLine('liveness', FULL_X, (metrics.liveness || []).slice(0, nSlots), 'Liveness Coefficient', 'Liveness Coefficient');
    drawLine('CV', FULL_X, (metrics.profit_variance || []).slice(0, nSlots), 'Coefficient of Variation', 'CV');
    drawLine('clusters', FULL_X, (metrics.clusters || []).slice(0, nSlots), 'Clusters', 'Clusters (#)');
    drawLine('totaldist', FULL_X, (metrics.total_distance || []).slice(0, nSlots), 'Total Distance', 'Total Distance');
    drawLine('avgnnd', FULL_X, (metrics.avg_nnd || []).slice(0, nSlots), 'Avg NND', 'Avg NND');
    drawLine('nni', FULL_X, (metrics.nni || []).slice(0, nSlots), 'NNI', 'NNI');
    drawLine('mev', FULL_X, (metrics.mev || []).slice(0, nSlots), 'MEV Earned', 'Block Value');
    drawLine('attest', FULL_X, (metrics.attestations || []).slice(0, nSlots), 'Attestation Rate %', 'Attestation Rate (%)');
    drawLine('failed', FULL_X, (metrics.failed_block_proposals || []).slice(0, nSlots), 'Failed Block Proposals', 'Failed Proposals (#)');
    drawLine('proposal', FULL_X, (metrics.proposal_times || []).slice(0, nSlots), 'Proposal Time (ms)', 'Proposal Time (ms)');
    drawRelayDist();

    plotsReady = true;
    updateLineWindows(slot);
  } else {
    updateLineWindows(slot);
    drawGlobe(slot);
  }
}

function tick() {
  if (playing) {
    slot = (slot + stepSize) % nSlots;
    drawAll();
  }
}

document.getElementById('play').onclick = () => { playing = true; };
document.getElementById('pause').onclick = () => { playing = false; };
document.getElementById('step').onchange = event => { stepSize = parseInt(event.target.value, 10) || 1; };
document.getElementById('theme').onclick = () => {
  dark = !dark;
  document.documentElement.classList.toggle('dark', dark);
  plotsReady = false;
  globeReady = false;
  drawAll();
};
document.getElementById('slider').oninput = event => {
  slot = parseInt(event.target.value, 10) || 0;
  playing = false;
  drawAll();
};

document.getElementById('export').onclick = async () => {
  if (!DATA) return;

  const zip = new JSZip();
  const btn = document.getElementById('export');
  btn.disabled = true;

  try {
    zip.file('data.json', RAW_DATA_JSON || JSON.stringify(DATA, null, 2));
    if (RAW_GCP_CSV) {
      zip.file('gcp_regions.csv', RAW_GCP_CSV);
    }

    const content = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(content);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'geo_simulation.zip';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  } catch (err) {
    console.error('Export failed', err);
  } finally {
    btn.disabled = false;
  }
};

(async function boot() {
  document.documentElement.classList.toggle('dark', dark);
  await loadData();
  drawAll();
  playing = !!SETTINGS.autoplay;
  stepSize = SETTINGS.step || 1;
  setInterval(tick, 250);
})().catch(err => {
  console.error(err);
  document.body.insertAdjacentHTML('beforeend', `<pre style="color:#ffb4b4;background:#2e1a1a;padding:10px;border-radius:8px">${String(err)}</pre>`);
});
</script>
</body>
</html>
